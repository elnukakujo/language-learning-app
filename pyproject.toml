    "fr-core-news-md",
    "hatchling>=1.27.0",
    "hr-core-news-md",
    "ipykernel>=6.29.5",
    "it-core-news-md",
    "ja-core-news-md",
    "ko-core-news-sm",
    "langcodes>=3.5.1",
    "langdetect>=1.0.9",
    "lt-core-news-md",
    "mk-core-news-md",
    "nb-core-news-md",
    "nl-core-news-md",
