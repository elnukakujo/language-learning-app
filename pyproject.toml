    "python-multipart>=0.0.20",
    "qwen-tts>=0.1.0",
    "ro-core-news-md",
    "ru-core-news-md",
    "sentence-transformers>=5.2.3",
    "sl-core-news-md",
    "spacy>=3.8.11",
